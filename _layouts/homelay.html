---
layout: default
---

<div class="home-hero">
  <div class="hero-grid-bg"></div>
  <div class="hero-particles"></div>
  <div class="hero-inner">
    <div class="hero-logo-row">
      <img src="{{ site.baseurl }}/images/infini-ai.png" alt="InfiniAI" class="hero-logo" />
    </div>
    <h1>Welcome to <span class="hero-accent">InfiniAI</span> Lab</h1>
    <p class="hero-subtitle"><i class="fas fa-microchip"></i> &nbsp;Efficient and Scalable AI Systems &nbsp;<span class="hero-dot">|</span>&nbsp; Carnegie Mellon University</p>
    <div class="hero-social">
      <a href="https://github.com/Infini-AI-Lab" target="_blank" class="hero-social-btn"><i class="fab fa-github"></i> GitHub</a>
      <a href="https://x.com/InfiniAILab" target="_blank" class="hero-social-btn"><i class="fab fa-twitter"></i> Twitter/X</a>
    </div>
  </div>
</div>

<div class="home-content">
  <div id="homeid" class="col-sm-7">
    {{ content }}
  </div>
  <div id="newsid" class="col-sm-5">
    {% include news.html %}
  </div>
</div>
