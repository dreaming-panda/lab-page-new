<div class="news-panel">
  <h4 class="news-title"><i class="bi bi-newspaper"></i> Latest News</h4>
  <div class="news-list">
    {% for article in site.data.news limit:8 %}
    <div class="news-item">
      <span class="news-date"><i class="bi bi-calendar3"></i> {{ article.date }}</span>
      <span class="news-headline">{{ article.headline | markdownify | remove: '<p>' | remove: '</p>' }}</span>
    </div>
    {% endfor %}
  </div>
</div>
